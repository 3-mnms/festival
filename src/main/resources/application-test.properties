spring.application.name=festival-service
spring.batch.job.enabled=true
spring.profiles.active=test

# MariaDB 설정
spring.datasource.url=jdbc:mariadb://localhost:3306/festival
spring.datasource.username=festivaluser
spring.datasource.password=festivalpw
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

server.port=9090

# 환경변수 파일(.env) import (optional)
spring.config.import=optional:file:.env[.properties]

# 외부 API Key (환경변수 or 기본값 dummy-key)
festival-api-key=${FESTIVAL_API_KEY:dummy-key}

# Kafka 설정
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.consumer.group-id=festival-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
