spring.config.import=optional:file:.env

#DB
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Redis (외부 사용 시 그대로 두고, 내부 Redis 쓰면 서비스 DNS로 교체)
spring.redis.host=${REDIS_HOST:192.168.0.141}
spring.redis.port=${REDIS_PORT:6379}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka Topic
app.kafka.topic.festival-event=festival-topic

# API Key
festival.api.key=${FESTIVAL_API_KEY:dummy-key}

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.default-produces-media-type=application/json
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.override-with-generic-response=false

# 게이트웨이/FE 베이스 (컨테이너에서는 gateway DNS 우선)
app.base-url=${APP_BASE_URL:http://gateway:10000}

# Server Port
server.port=8083

#AI URL
ai.url=${AI_URL}

# S3
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
aws.region=${AWS_REGION}
aws.sts.role-arn=${AWS_STS_ROLE_ARN}

management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true

# Kakao
kakao.restapi-key=${KAKAO_REST_API_KEY}
kakao.search-base-url=https://dapi.kakao.com

#10s
festival.geocode.initial-delay-ms=10000
#60m
festival.geocode.fixed-delay-ms=3600000

#api
base.service.url=${BASE_API}
user.geocode.url=${USER_GEOCODE_API}


# base + path 로 조합되는 구조라면, base는 게이트웨이, path는 기본 경로로 fallback 제공
base.service.url=${BASE_API:http://gateway:10000}
user.geocode.url=${USER_GEOCODE_API:/api/user/geocode}

# =========================
# 모니터링 / 지표
# =========================
spring.application.name=festival-service
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles-histogram.hikaricp.connections.acquire=true
management.metrics.distribution.sla.hikaricp.connections.acquire=5ms,10ms,20ms,50ms,100ms,200ms,500ms
server.tomcat.mbeanregistry.enabled=true

