spring.config.import=optional:file:.env

#DB
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Redis
spring.redis.host=192.168.0.141
spring.redis.port=6379

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9094}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka Topic
app.kafka.topic.festival-event=festival-topic

# API Key
festival.api.key=${FESTIVAL_API_KEY:dummy-key}

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.default-produces-media-type=application/json
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.override-with-generic-response=false

app.base-url=${APP_BASE_URL:http://localhost:10000}

# Server Port
server.port=8083

#AI URL
ai.url=${AI_URL}

# S3
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
aws.region=${AWS_REGION}
aws.sts.role-arn=${AWS_STS_ROLE_ARN}

management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true

# Kakao
kakao.restapi-key=${KAKAO_REST_API_KEY}
kakao.search-base-url=https://dapi.kakao.com

#10s
festival.geocode.initial-delay-ms=10000
#60m
festival.geocode.fixed-delay-ms=3600000

#api
base.service.url=${BASE_API}
user.geocode.url=${USER_GEOCODE_API}


# =========================
# 추가: 모니터링 / 지표 설정
# =========================

# 애플리케이션 이름(메트릭 라벨 application으로 사용)
spring.application.name=festival-service

# Actuator 세부정보 노출 & 공통 태그(application)
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# HTTP 서버 지연 히스토그램(p95 용)
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Hikari 커넥션 획득 지연 히스토그램(p95 용)
management.metrics.distribution.percentiles-histogram.hikaricp.connections.acquire=true
# (선택) 버킷 구간 세분화
management.metrics.distribution.sla.hikaricp.connections.acquire=5ms,10ms,20ms,50ms,100ms,200ms,500ms

# Tomcat MBean 지표 활성화(threads busy 등)
server.tomcat.mbeanregistry.enabled=true