#DB ??
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Redis ??
spring.redis.host=192.168.0.141
spring.redis.port=6379

# Kafka ??
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9094}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# spring.kafka.enabled=false

# Kafka Topic
app.kafka.topic.festival-event=festival-topic

# API Key
festival.api.key=${FESTIVAL_API_KEY:dummy-key}

# Swagger

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.default-produces-media-type=application/json
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.override-with-generic-response=false

# Server Port (????)
server.port=8083

spring.config.import=optional:file:.env

# AWS Configuration
# These map the environment variables to the properties your code expects.
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
cloud.aws.s3.bucket=${AWS_S3_BUCKET_NAME}
cloud.aws.region.static=${AWS_REGION}
cloud.aws.sts.role-arn=${AWS_STS_ROLE_ARN}
