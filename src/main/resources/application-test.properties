#DB 설정
#spring.datasource.url=jdbc:mariadb://192.168.0.139:3306/festival
#spring.datasource.username=festivaluser
#spring.datasource.password=festivalpw
#spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
#spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/festival_db
#spring.datasource.username=festival
#spring.datasource.password=festival
#spring.datasource.driverClassName=org.mariadb.jdbc.Driver

spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/festival
spring.datasource.username=festivaluser
spring.datasource.password=festivalpw
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Redis 설정
spring.redis.host=192.168.0.141
spring.redis.port=6379

# Kafka 설정
#spring.kafka.bootstrap-servers=192.168.0.139:9094
spring.kafka.bootstrap-servers=localhost:9092

# Kafka Producer 설정
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.default-produces-media-type=application/json

# Kafka Topic Custom Property
app.kafka.topic.festival-event=festival-event

# Server Port (테스트용)
#server.port=9090

# festival-api-key를 환경변수에서 불러오고, 없으면 dummy-key로 처리
spring.config.import=optional:file:.env[.properties]
festival.api.key=${FESTIVAL_API_KEY:dummy-key}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.override-with-generic-response=false 